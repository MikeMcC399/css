name: CI
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:
jobs:
    verify_files:
        name: Verify Files
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.14.0
            - name: Enable pnpm
              run: |
                  corepack enable pnpm
                  corepack use pnpm@latest
            - name: .npmrc for pnpm
              run: |
                  cat > .npmrc <<EOT
                  auto-install-peers=true
                  node-linker=hoisted
                  EOT
            - name: Install dependencies
              run: pnpm install
            - name: Build
              run: pnpm run build
            - name: Lint files
              run: pnpm run lint
            - name: Check Formatting
              run: pnpm run fmt:check
